<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusLens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

    :root {
      --bg: #09090f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --accent: #7c6eff;
      --focused: #00e5a0;
      --mild: #f5c518;
      --distracted: #ff8c42;
      --critical: #ff3d6b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), #c46eff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, #b0b0cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Live Panel ── */
    #panel-live {
      display: block;
    }

    #panel-history {
      display: none;
    }

    /* ── Score ring ── */
    .score-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 16px;
      position: relative;
    }

    .ring-wrap {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .ring-svg {
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 10;
    }

    .ring-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .ring-score {
      font-family: 'Space Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      transition: color 0.4s;
    }

    .ring-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pill {
      margin-top: 12px;
      padding: 5px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.4s;
    }

    .session-time {
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Metrics grid ── */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 12px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color 0.3s;
    }

    .metric:hover {
      border-color: var(--accent);
    }

    .metric-icon {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .metric-val {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .metric-key {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .metric.alert .metric-val {
      color: var(--critical);
    }

    .metric.warn .metric-val {
      color: var(--distracted);
    }

    /* ── Scroll viz ── */
    .scroll-section {
      padding: 0 16px 12px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .scroll-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      overflow: hidden;
    }

    .scroll-bar {
      flex: 1;
      border-radius: 2px;
      min-height: 2px;
      transition: height 0.3s;
    }

    /* ── Bot risk ── */
    .bot-section {
      padding: 0 16px 16px;
    }

    .bot-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-icon {
      font-size: 18px;
    }

    .bot-info {
      flex: 1;
    }

    .bot-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bot-bar-bg {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .bot-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .bot-val {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── No data ── */
    .no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      gap: 12px;
      min-height: 300px;
    }

    .no-data-icon {
      font-size: 40px;
    }

    .no-data-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .no-data-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .refresh-btn {
      padding: 8px 20px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover {
      opacity: 0.85;
    }

    /* ── History panel ── */
    .history-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 430px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-info {
      flex: 1;
      overflow: hidden;
    }

    .history-url {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-score {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
    }

    .history-time {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .clear-btn {
      margin: 8px 16px 16px;
      width: calc(100% - 32px);
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--critical);
      color: var(--critical);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── Pulse animation ── */
    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--focused);
      border-radius: 50%;
      animation: pulse 2s infinite;
      display: inline-block;
      margin-right: 4px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <span class="logo-name">FocusLens</span>
    </div>
    <div class="header-right">
      <span class="live-dot"></span>
      <button class="tab-btn active" id="btn-live">Live</button>
      <button class="tab-btn" id="btn-history">History</button>
      <button class="tab-btn" id="btn-testbed" title="Open full Signal Testbed">🔬 Testbed</button>
    </div>
  </div>

  <!-- LIVE PANEL -->
  <div id="panel-live">
    <div id="live-content">
      <div class="no-data">
        <div class="no-data-icon">🕵️</div>
        <div class="no-data-title">Waiting for data…</div>
        <div class="no-data-sub">Browse or interact with any page and FocusLens will start tracking your attention
          patterns.</div>
        <button class="refresh-btn" id="refresh-btn">Refresh</button>
      </div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div id="panel-history">
    <div class="history-list" id="history-list">
      <div class="no-data" style="min-height:200px">
        <div class="no-data-icon">📊</div>
        <div class="no-data-title">No history yet</div>
        <div class="no-data-sub">Sessions will appear here as you browse.</div>
      </div>
    </div>
    <button class="clear-btn" id="clear-btn">Clear History</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
